---
- name: Secure Azure VM provisioning via Direct REST API
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    # 1. READ SECURE AZURE AUTH DETAILS FROM INJECTED CONTROLLER ENVIRONMENT
    azure_client_id: "{{ lookup('ansible.builtin.env', 'AZURE_CLIENT_ID') }}"
    azure_secret: "{{ lookup('ansible.builtin.env', 'AZURE_SECRET') }}"
    azure_tenant: "{{ lookup('ansible.builtin.env', 'AZURE_TENANT') }}"
    azure_subscription_id: "{{ lookup('ansible.builtin.env', 'AZURE_SUBSCRIPTION_ID') }}"

    # 2. RUNTIME INFRASTRUCTURE CONFIGURATIONS (Maps to your Survey variables)
    resource_group: "{{ resource_group | default('rg-cs-ansible') }}"
    location: "{{ location | default('eastus') }}"
    network_name: "{{ network_name | default('vnet-cs-ansible') }}"
    network_cidr: "{{ network_cidr | default('10.0.0.0/16') }}"
    subnet_name: "{{ subnet_name | default('subnet-cs-ansible') }}"
    subnet_cidr: "{{ subnet_cidr | default('10.0.1.0/24') }}"
    security_group: "{{ security_group | default('nsg-cs-ansible') }}"
    nic_name: "{{ nic_name | default('nic-cs-ansible') }}"
    vm_name: "{{ vm_name | default('vm-cs-ansible') }}"
    tcp_ports: "{{ tcp_ports | default('80,443,22') }}"
    
    # 3. COMPUTE PROFILES
    username: "{{ username | default('azureuser') }}"
    password: "{{ password }}"  # Pulled directly from your template's secure prompt/survey
    os_type: "{{ os_type | default('Linux') }}"
    publisher: "{{ publisher | default('Canonical') }}"
    offer: "{{ offer | default('0001-com-ubuntu-server-jammy') }}"
    sku: "{{ sku | default('22_04-lts-gen2') }}"
    deploymentID: "{{ deploymentID | default('azure-linux-deployment') }}"

  tasks:
    - name: Obtain Azure REST API Access Token
      ansible.builtin.uri:
        url: "https://microsoftonline.com{{ azure_tenant }}/oauth2/v2.0/token"
        method: POST
        body_format: form-urlencoded
        body:
          client_id: "{{ azure_client_id }}"
          grant_type: client_credentials
          scope: "https://azure.com"
          client_secret: "{{ azure_secret }}"
        status_code: 200
      register: token_response
      no_log: true 

    - name: Report Token Authentication Status
      ansible.builtin.debug:
        msg: "Step 1/6: OAuth Authentication successful. Token obtained from Microsoft Identity Platform."

    - name: Create resource group
      ansible.builtin.uri:
        url: "https://azure.com{{ azure_subscription_id }}/resourcegroups/{{ resource_group }}?api-version=2021-04-01"
        method: PUT
        status_code: [200, 201]
        headers:
          Authorization: "Bearer {{ token_response.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          location: "{{ location }}"
          tags:
            deploymentID: "{{ deploymentID }}"
      register: rg_output

    - name: Report Resource Group Deployment Status
      ansible.builtin.debug:
        msg: "Step 2/6: Resource Group Deployment responded with HTTP Status: {{ rg_output.status }} (ProvisioningState: {{ rg_output.json.properties.provisioningState | default('N/A') }})"

    - name: Create virtual network and subnet
      ansible.builtin.uri:
        url: "https://azure.com{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/virtualNetworks/{{ network_name }}?api-version=2023-11-01"
        method: PUT
        status_code: [200, 201]
        headers:
          Authorization: "Bearer {{ token_response.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          location: "{{ location }}"
          tags:
            deploymentID: "{{ deploymentID }}"
          properties:
            addressSpace:
              addressPrefixes:
                - "{{ network_cidr }}"
            subnets:
              - name: "{{ subnet_name }}"
                properties:
                  addressPrefix: "{{ subnet_cidr }}"
      register: vnet_output

    - name: Report Virtual Network Deployment Status
      ansible.builtin.debug:
        msg: "Step 3/6: Virtual Network & Subnet Deployment responded with HTTP Status: {{ vnet_output.status }} (ProvisioningState: {{ vnet_output.json.properties.provisioningState | default('N/A') }})"

    - name: Create Network Security Group
      ansible.builtin.uri:
        url: "https://azure.com{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/networkSecurityGroups/{{ security_group }}?api-version=2023-11-01"
        method: PUT
        status_code: [200, 201]
        headers:
          Authorization: "Bearer {{ token_response.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          location: "{{ location }}"
          tags:
            deploymentID: "{{ deploymentID }}"
          properties:
            securityRules:
              - name: allow_web_traffic
                properties:
                  protocol: Tcp
                  destinationPortRange: "{{ tcp_ports }}"
                  access: Allow
                  priority: 1002
                  direction: Inbound
                  sourceAddressPrefix: '*'
                  sourcePortRange: '*'
                  destinationAddressPrefix: '*'
      register: nsg_output

    - name: Report Network Security Group Deployment Status
      ansible.builtin.debug:
        msg: "Step 4/6: Network Security Group Deployment responded with HTTP Status: {{ nsg_output.status }} (ProvisioningState: {{ nsg_output.json.properties.provisioningState | default('N/A') }})"

    - name: Create network interface
      ansible.builtin.uri:
        url: "https://azure.com{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/networkInterfaces/{{ nic_name }}?api-version=2023-11-01"
        method: PUT
        status_code: [200, 201]
        headers:
          Authorization: "Bearer {{ token_response.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          location: "{{ location }}"
          tags:
            deploymentID: "{{ deploymentID }}"
          properties:
            ipConfigurations:
              - name: default
                properties:
                  privateIPAllocationMethod: Dynamic
                  subnet:
                    id: "/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/virtualNetworks/{{ network_name }}/subnets/{{ subnet_name }}"
                  networkSecurityGroup:
                    id: "/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/networkSecurityGroups/{{ security_group }}"
      register: nic_output

    - name: Report Network Interface Deployment Status
      ansible.builtin.debug:
        msg: "Step 5/6: Network Interface Deployment responded with HTTP Status: {{ nic_output.status }} (ProvisioningState: {{ nic_output.json.properties.provisioningState | default('N/A') }})"

    - name: Create VM with Managed Disk
      ansible.builtin.uri:
        url: "https://azure.com{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Compute/virtualMachines/{{ vm_name }}?api-version=2023-09-01"
        method: PUT
        status_code: [200, 201, 202]
        headers:
          Authorization: "Bearer {{ token_response.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          location: "{{ location }}"
          tags:
            deploymentID: "{{ deploymentID }}"
          properties:
            hardwareProfile:
              vmSize: Standard_DS1_v2
            storageProfile:
              imageReference:
                publisher: "{{ publisher }}"
                offer: "{{ offer }}"
                sku: "{{ sku }}"
                version: latest
              osDisk:
                name: "{{ vm_name }}_os_disk"
                createOption: FromImage
                managedDisk:
                  storageAccountType: Standard_LRS
            osProfile:
              computerName: "{{ vm_name }}"
              adminUsername: "{{ username }}"
              adminPassword: "{{ password }}"
            networkProfile:
              networkInterfaces:
                - id: "/subscriptions/{{ azure_subscription_id }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/networkInterfaces/{{ nic_name }}"
      register: vm_output

    - name: Report Virtual Machine Deployment Status
      ansible.builtin.debug:
        msg: "Step 6/6: Virtual Machine Deployment request completed with HTTP Status: {{ vm_output.status }} (ProvisioningState: {{ vm_output.json.properties.provisioningState | default('Accepted/Creating') }})"
