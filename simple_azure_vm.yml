---
- name: Azure VM provisioning
  hosts: localhost
  connection: local
  gather_facts: no

  collections:
    - azure.azcollection

  vars:
    deploymentID: "{{ deploymentID }}"
    location: "{{ location }}"
    # Read the credentials provided by your attached Azure Template Credential
    azure_client_id: "{{ lookup('ansible.builtin.env', 'AZURE_CLIENT_ID') }}"
    azure_secret: "{{ lookup('ansible.builtin.env', 'AZURE_SECRET') }}"
    azure_tenant: "{{ lookup('ansible.builtin.env', 'AZURE_TENANT') }}"
    azure_subscription_id: "{{ lookup('ansible.builtin.env', 'AZURE_SUBSCRIPTION_ID') }}"

  tasks:
    - name: Create resource group
      azure_rm_resourcegroup:
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_secret }}"
        tenant: "{{ azure_tenant }}"
        subscription_id: "{{ azure_subscription_id }}"
        auth_source: env
        name: "{{ resource_group }}"
        location: "{{ location }}"
        tags:
          deploymentID: "{{ deploymentID }}"

    - name: Create virtual network
      azure_rm_virtualnetwork:
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_secret }}"
        tenant: "{{ azure_tenant }}"
        subscription_id: "{{ azure_subscription_id }}"
        auth_source: env
        resource_group: "{{ resource_group }}"
        name: "{{ network_name }}"
        address_prefixes:
          - "{{ network_cidr }}"
        tags:
          deploymentID: "{{ deploymentID }}"

    - name: Add subnet
      azure_rm_subnet:
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_secret }}"
        tenant: "{{ azure_tenant }}"
        subscription_id: "{{ azure_subscription_id }}"
        auth_source: env
        resource_group: "{{ resource_group }}"
        name: "{{ subnet_name }}"
        address_prefix: "{{ subnet_cidr }}"
        virtual_network: "{{ network_name }}"

    - name: Create Network Security Group
      azure_rm_securitygroup:
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_secret }}"
        tenant: "{{ azure_tenant }}"
        subscription_id: "{{ azure_subscription_id }}"
        auth_source: env
        resource_group: "{{ resource_group }}"
        name: "{{ security_group }}"
        rules:
          - name: allow_web_traffic
            protocol: Tcp
            destination_port_range: "{{ tcp_ports }}"
            access: Allow
            priority: 1002
            direction: Inbound
        tags:
          deploymentID: "{{ deploymentID }}"

    - name: Create network interface
      azure_rm_networkinterface:
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_secret }}"
        tenant: "{{ azure_tenant }}"
        subscription_id: "{{ azure_subscription_id }}"
        auth_source: env
        name: "{{ nic_name }}"
        resource_group: "{{ resource_group }}"
        virtual_network: "{{ network_name }}"
        subnet_name: "{{ subnet_name }}"
        security_group: "{{ security_group }}"
        ip_configurations:
          - name: default
            primary: true
        tags:
          deploymentID: "{{ deploymentID }}"

    - name: Create VM with Managed Disk
      azure_rm_virtualmachine:
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_secret }}"
        tenant: "{{ azure_tenant }}"
        subscription_id: "{{ azure_subscription_id }}"
        auth_source: env
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}"
        vm_size: Standard_DS1_v2
        admin_username: "{{ username }}"
        admin_password: "{{ password }}"
        network_interface_names:
          - "{{ nic_name }}"
        os_type: "{{ os_type }}"
        image:
          offer: "{{ offer }}"
          publisher: "{{ publisher }}"
          sku: "{{ sku }}"
          version: latest
        managed_disk_type: Standard_LRS
        tags:
          deploymentID: "{{ deploymentID }}"
      register: vm

    - name: Debug VM output
      debug:
        var: vm
